name: Update Skill

on:
  release:
    types: [published]

jobs:
  update-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for tags and diffs
          token: ${{ secrets.SYNCED_GITHUB_TOKEN_REPO }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Generate Diff
        run: |
          # The new release tag is GITHUB_REF_NAME when triggered on release
          # Find the tag immediately preceding this one
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${GITHUB_REF_NAME}^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # If no previous tag, diff against the initial commit
            INITIAL_COMMIT=$(git rev-list --max-parents=0 HEAD)
            git diff $INITIAL_COMMIT..HEAD > release_diff.patch
          else
            git diff $PREVIOUS_TAG..$GITHUB_REF_NAME > release_diff.patch
          fi
          
      - name: Update Skill via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/update_skill.py
        
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Checkout main branch to push the update there
          git checkout main
          
          # Copy the updated file to the main branch
          git checkout ${GITHUB_REF_NAME} -- .gemini/skills/android-maps-compose/SKILL.md
          
          git add .gemini/skills/android-maps-compose/SKILL.md
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "docs: update SKILL.md based on release ${GITHUB_REF_NAME} diff [skip ci]"
            git push origin main
          else
            echo "No changes in SKILL.md"
          fi
