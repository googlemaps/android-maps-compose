name: Issue Triage with Gemini

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      title:
        description: 'Mock Issue Title'
        default: 'Test Issue'
      body:
        description: 'Mock Issue Body'
        default: 'This is a test issue description.'

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run Triage Script
        id: run_script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title || github.event.inputs.title }}
          ISSUE_BODY: ${{ github.event.issue.body || github.event.inputs.body }}
        run: |
          labels=$(python .github/scripts/triage_issue.py)
          echo "labels=$labels" >> $GITHUB_OUTPUT

      - name: Apply Labels
        if: steps.run_script.outputs.labels != '' && (github.event.issue.number)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          LABELS: ${{ steps.run_script.outputs.labels }}
        run: |
          # Convert comma-separated labels to gh command arguments
          IFS=',' read -ra ADDR <<< "$LABELS"
          priority_added=false
          for i in "${ADDR[@]}"; do
            # Trim whitespace
            label=$(echo "$i" | xargs)
            # Only add the first priority label found
            if [[ "$label" == priority:* ]] && [ "$priority_added" = false ]; then
              gh issue edit "$ISSUE_NUMBER" --add-label "$label"
              priority_added=true
            fi
          done
          # Remove 'triage me' label
          gh issue edit "$ISSUE_NUMBER" --remove-label "triage me" || true

      - name: Generate Answer with Gemini
        if: github.event_name == 'workflow_dispatch' || github.event.action == 'opened'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title || github.event.inputs.title }}
          ISSUE_BODY: ${{ github.event.issue.body || github.event.inputs.body }}
        run: |
          python .github/scripts/answer_issue.py

      - name: Post Answer Comment
        if: (github.event_name == 'workflow_dispatch' || github.event.action == 'opened') && hashFiles('issue_response.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || 'mock' }}
        run: |
          if [ "$ISSUE_NUMBER" != "mock" ]; then
            gh issue comment "$ISSUE_NUMBER" -F issue_response.md
          else
            echo "Mock run. Generated response is:"
            cat issue_response.md
          fi